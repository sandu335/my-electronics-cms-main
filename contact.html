<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />

        <button class="menu-toggle" aria-label="Deschide meniul">

        <nav class="site-nav">

    <main class="page">
      <div class="container content-page">
        <h1>Contact</h1>
        <p>Trimite-ne un mesaj pentru ofertă, informații sau colaborări.</p>
        <form class="contact-form">
          <input type="text" placeholder="Numele tău" />
          <input type="email" placeholder="Email" />
          <textarea rows="5" placeholder="Mesajul tău"></textarea>
          <button class="btn btn-primary" type="submit">Trimite</button>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <p>© <span id="year"></span> ElectroHub. Toate drepturile rezervate.</p>
        <a href="contact.html">Contact</a>
      </div>
    </footer>

    <script src="script.js"></script>
